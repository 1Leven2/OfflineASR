# OfflineASR Default Configuration

model:
  path: models/model.onnx
  input_name: "input"
  output_name: "output"

runtime:
  backend: onnx
  num_threads: 8
  tensorrt:
    device_id: 0
    use_fp16: false
    max_workspace_size: 1073741824
    engine_cache_dir: "models"

feature:
  sample_rate: 16000
  frame_length_ms: 25.0
  frame_shift_ms: 10.0
  num_mel_bins: 80
  pre_emphasis_alpha: 0.97

decoder:
  beam_size: 10
  n_best: 1
  cutoff_threshold: 0.0

tokens: models/tokens.txt

# VAD
vad:
  enabled: false
  type: energy
  threshold: 0.01
  frame_ms: 30
  min_speech_ms: 100
  min_silence_ms: 200

# Endpoint detection (streaming only)
endpoint:
  enabled: false
  silence_timeout_ms: 800
  decoder_stability_frames: 40
  max_utterance_ms: 30000

# Punctuation insertion (pause-gap based)
punctuation:
  enabled: false
  period_silence_ms: 800
  comma_silence_ms: 300

# Inverse Text Normalization
itn:
  enabled: false
